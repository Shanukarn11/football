name: Build and validate IKF

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ikf-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/shanukarn11/football

jobs:
  build-test-publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ikf-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify installed dependencies
        run: docker run --rm ikf-ci:${{ github.sha }} python -m pip check

      - name: Compile Python source
        run: |
          docker run --rm ikf-ci:${{ github.sha }} \
            python -m compileall -q /app/manage.py /app/ikf /app/main /app/internal

      - name: Run Django system checks
        run: |
          docker run --rm \
            -e DEBUG=True \
            -e SECRET_KEY=ci-only-secret-key \
            -e APP_ALLOWED_URL=localhost \
            -e DB_NAME=ci \
            -e DB_USER=ci \
            -e DB_PASSWORD=ci \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=3306 \
            -e LAT_DB_NAME=ci \
            -e LAT_DB_USER=ci \
            -e LAT_DB_PASSWORD=ci \
            -e LAT_DB_HOST=127.0.0.1 \
            -e LAT_DB_PORT=3306 \
            ikf-ci:${{ github.sha }} \
            python manage.py check

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish verified image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker tag ikf-ci:${{ github.sha }} "$IMAGE:${{ github.sha }}"
          docker tag ikf-ci:${{ github.sha }} "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
