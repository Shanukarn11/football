services:
  web:
    image: ${IKF_IMAGE:-ghcr.io/shanukarn11/football:latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./docker-data/static:/app/assets
      - ./docker-data/media:/app/media
    restart: unless-stopped
    init: true
