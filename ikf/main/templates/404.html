<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            position: relative;
            padding: 20px;
        }
        /* Background image with a white overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.shutterstock.com/shutterstock/videos/1100228995/thumb/5.jpg?ip=x480');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            opacity: 0.7; /* Adjust the transparency */
            z-index: -1;
            filter: brightness(1.5); /* Optional: increase brightness */
        }
        .overlay {
            background-color: rgba(255, 255, 255, 0.645); /* White overlay */
            padding: 20px;
            border-radius: 10px;
        }
        .container {
            text-align: center;
            padding: 15px;
        }
        h1 {
            font-size: 2rem;
            color: #323232;
        }
        p {
            font-size: 1rem;
            color: #2e2e2e;
            margin: 20px 0;
        }
        a {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: #0056b3;
        }
        .error-code {
            font-size: 5rem;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <div class="error-code">404</div>
            <h1>Oops! Page Not Found</h1>
            <p>Sorry, the page you're looking for doesn't exist.</p>
            <a href="/">Go to Homepage</a>
        </div>
    </div>
</body>
</html>
