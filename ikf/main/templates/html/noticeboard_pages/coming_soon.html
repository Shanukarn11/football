{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --yellow:        #ffc300;
    --yellow-soft:   rgba(255,195,0,0.10);
    --yellow-border: rgba(255,195,0,0.30);
    --ink:           #111318;
    --muted:         #6b7280;
    --border:        #e8e8e8;
    --white:         #ffffff;
    --light:         #f9f9f9;
    --radius:        14px;
    --shadow:        0 18px 45px rgba(15,23,42,.08);
  }

  .cs-page {
    font-family: 'Sora', system-ui, sans-serif;
    background: var(--white);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .cs-topbar {
    max-width: 1120px;
    margin: 0 auto;
    padding: 16px 8px 14px;
    border-bottom: 1px solid var(--border);
  }

  .cs-back-link {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    transition: border-color .15s, background .15s;
  }
  .cs-back-link:hover {
    border-color: var(--yellow);
    background: rgba(255,249,230,0.85);
  }

  .cs-outer {
    max-width: 1120px;
    margin: 0 auto;
    padding: 20px 8px 80px;
  }

  .cs-banner-img {
    width: 100%;
    display: block;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 22px;
    height: 340px;
    object-fit: cover;
  }
  @media (max-width: 900px) { .cs-banner-img { height: 220px; } }
  @media (max-width: 600px) { .cs-banner-img { height: auto; object-fit: contain; background: #fff; } }

  .cs-page-title {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin: 0 0 28px;
  }

  @media (max-width: 820px) { .cs-page-title { font-size: 26px; } }
  @media (max-width: 600px) {
    .cs-page-title { font-size: 22px; }
    .cs-outer { padding: 16px 16px 80px; }
  }

  .cs-box {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 60px 32px;
    text-align: center;
    background: var(--light);
  }

  .cs-box-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    margin: 0 0 10px;
  }

  .cs-box-text {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.7;
    margin: 0 0 24px;
  }

  .cs-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 999px;
    background: var(--yellow);
    border: 1px solid rgba(255,195,0,0.5);
    color: var(--ink);
    font-size: 13px;
    font-weight: 800;
    text-decoration: none;
    transition: background .15s;
  }
  .cs-btn:hover { background: #e6af00; }
</style>

<div class="cs-page">

  <div class="cs-topbar">
    <a class="cs-back-link" href="{% url 'noticeboard_home' %}">← Notice Board</a>
  </div>

  <div class="cs-outer">

    <img class="cs-banner-img"
         src="{% static 'images/noticeboard3.jpeg' %}"
         alt="Official Circulars">

    <h1 class="cs-page-title">Official Circulars, Notices &amp; Announcements</h1>

    <div class="cs-box">
      <p class="cs-box-title">Coming Soon</p>
      <p class="cs-box-text">
        Official circulars, notices and announcements from IKF will be published here.<br>
        Stay tuned
      </p>
      <a class="cs-btn" href="{% url 'noticeboard_home' %}">← Back to Notice Board</a>
    </div>

  </div>

</div>
{% endblock %}
