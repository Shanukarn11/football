{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --yellow:        #ffc300;
    --yellow-soft:   rgba(255,195,0,0.10);
    --yellow-border: rgba(255,195,0,0.30);
    --ink:           #111318;
    --muted:         #6b7280;
    --border:        #e8e8e8;
    --white:         #ffffff;
    --light:         #f9f9f9;
    --radius:        14px;
    --shadow:        0 18px 45px rgba(15,23,42,.08);
    --shadow-sm:     0 4px 14px rgba(15,23,42,.05);
  }

  .med-page {
    font-family: 'Sora', system-ui, -apple-system, sans-serif;
    background: var(--white);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOP BAR ── */
  .med-topbar {
    max-width: 1120px;
    margin: 0 auto;
    padding: 16px 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .med-back-link {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255,255,255,0.9);
    transition: border-color .15s, color .15s, background .15s;
  }
  .med-back-link:hover {
    border-color: var(--yellow);
    color: var(--ink);
    background: rgba(255,249,230,0.85);
  }

  /* ── OUTER WRAP — banner + heading (constrained) ── */
  .med-outer {
    max-width: 1120px;
    margin: 0 auto;
    padding: 20px 8px 0;
  }

  /* ── BANNER ── */
  .med-banner-img {
    width: 100%;
    display: block;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--light);
    box-shadow: var(--shadow);
    margin-bottom: 22px;
    height: 340px;
    object-fit: cover;
    object-position: center;
  }
  @media (max-width: 900px) {
    .med-banner-img { height: 220px; }
  }
  @media (max-width: 600px) {
    .med-banner-img { height: auto; object-fit: contain; background: #fff; }
  }

  /* ── HEADING ── */
  .med-heading-block { margin-bottom: 20px; }

  .med-page-title {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--ink);
    margin: 0 0 6px;
  }

  .med-page-sub {
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    margin: 0 0 14px;
    line-height: 1.65;
    max-width: 700px;
  }

  /* channel link */
  .med-yt-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--yellow-border);
    background: var(--yellow-soft);
    color: var(--ink);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    transition: background .15s, border-color .15s, transform .15s;
  }
  .med-yt-link:hover {
    background: rgba(255,195,0,0.22);
    border-color: rgba(255,195,0,0.60);
    transform: translateY(-1px);
  }
  .med-yt-link-icon {
    width: 20px; height: 20px;
    background: #ff0000;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .med-yt-link-icon svg { width: 11px; height: 11px; fill: #fff; margin-left: 2px; }

  /* ══════════════════════════════════════════════════
     CARDS SECTION — aligned with outer wrap
  ══════════════════════════════════════════════════ */
  .cards-section {
    max-width: 1120px;
    margin: 0 auto;
    padding: 20px 8px 80px;
  }

  /* count badge */
  .med-count-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .med-count-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 14px;
    border-radius: 999px;
    background: var(--yellow-soft);
    border: 1px solid var(--yellow-border);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }
  .med-count-pill::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--yellow);
    flex-shrink: 0;
  }

  .med-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 1100px) { .med-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px)  { .med-grid { grid-template-columns: 1fr; } }

  /* ── CARD ── */
  .med-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .med-card:hover {
    transform: translateY(-3px);
    border-color: var(--yellow-border);
    box-shadow: var(--shadow);
  }
  /* yellow top stripe */
  .med-card::before {
    content: "";
    display: block;
    height: 4px;
    background: var(--yellow);
    flex-shrink: 0;
  }

  /* ── THUMBNAIL ── */
  .med-thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0f0f0f;
    overflow: hidden;
    flex-shrink: 0;
  }
  .med-thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .25s ease;
  }
  .med-card:hover .med-thumb-img { transform: scale(1.05); }

  /* dark overlay */
  .med-thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.10) 50%, transparent 100%);
    transition: background .15s;
  }
  .med-card:hover .med-thumb-overlay {
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 50%, transparent 100%);
  }

  /* play button */
  .med-play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 54px; height: 38px;
    border-radius: 10px;
    background: rgba(180,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    transition: background .15s, transform .15s;
  }
  .med-card:hover .med-play-btn {
    background: #cc0000;
    transform: translate(-50%, -50%) scale(1.10);
  }
  .med-play-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 3px; }

  /* playlist badge */
  .med-playlist-badge {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 6px;
    letter-spacing: .05em;
    text-transform: uppercase;
    backdrop-filter: blur(4px);
    display: flex; align-items: center; gap: 5px;
  }
  .med-playlist-badge::before {
    content: "";
    display: inline-block;
    width: 10px; height: 8px;
    background:
      linear-gradient(#fff 0 0) 0 0,
      linear-gradient(#fff 0 0) 0 50%,
      linear-gradient(#fff 0 0) 0 100%;
    background-size: 60% 2px;
    background-repeat: no-repeat;
    opacity: 0.85;
  }

  /* ── CARD BODY ── */
  .med-card-body {
    padding: 13px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
  }

  .med-card-city {
    font-size: 16px;
    font-weight: 800;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .med-card-state {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-top: 1px;
  }

  .med-card-project {
    margin-top: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .med-card-project::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--yellow);
    flex-shrink: 0;
  }

  .med-card-cta {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    color: #cc0000;
    text-transform: uppercase;
    letter-spacing: .04em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .med-card-cta::before {
    content: "▶";
    font-size: 9px;
  }

  /* ── skeleton loader ── */
  .med-skeleton {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: linear-gradient(90deg,
      rgba(255,255,255,.5),
      rgba(249,250,251,.95),
      rgba(255,255,255,.5));
    background-size: 200% 100%;
    animation: shimmer 1.1s infinite;
    height: 260px;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── empty / error ── */
  .med-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
  }

  /* ── floating back button ── */
  .med-float-back {
    position: fixed;
    right: 20px; bottom: 20px;
    z-index: 50;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--yellow-border);
    background: rgba(255,255,255,0.96);
    box-shadow: 0 8px 30px rgba(15,23,42,0.12);
    color: var(--ink);
    text-decoration: none;
    font-weight: 800;
    font-size: 13px;
    backdrop-filter: blur(8px);
    transform: translateY(12px);
    opacity: 0;
    pointer-events: none;
    transition: transform .18s, opacity .18s, border-color .15s;
  }
  .med-float-back:hover { border-color: var(--yellow); }
  .med-float-back.show  { transform: translateY(0); opacity: 1; pointer-events: auto; }

  /* ── responsive ── */
  @media (max-width: 820px) {
    .med-outer    { padding: 16px 16px 0; }
    .cards-section{ padding: 16px 16px 80px; }
    .med-page-title { font-size: 26px; }
  }
  @media (max-width: 600px) {
    .med-page-title { font-size: 22px; }
  }
</style>

<div class="med-page">

  <!-- Top bar -->
  <div class="med-topbar">
    <a class="med-back-link" href="https://indiakhelofootball.com/noticeboard">← Notice Board</a>
  </div>

  <!-- Banner + heading (constrained) -->
  <div class="med-outer">

    <img class="med-banner-img"
         src="{% static 'images/noticeboard3.jpeg' %}"
         alt="IKF Post Trial Media">

    <div class="med-heading-block">
      <h1 class="med-page-title">Post Trial Media</h1>
      <p class="med-page-sub">
        Get the latest updates on trial day’s match videos.
      </p>
      <a class="med-yt-link"
         href="https://www.youtube.com/@IKFShowcase"
         target="_blank"
         rel="noopener noreferrer">
        <span class="med-yt-link-icon">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </span>
        View IKF Trial Showcase Channel
      </a>
    </div>

  </div>

  <!-- Cards — aligned with outer -->
  <div class="cards-section">
    <div class="med-count-row">
      <span class="med-count-pill" id="countPill">Loading…</span>
    </div>
    <div id="medGrid" class="med-grid">
      <div class="med-skeleton"></div>
      <div class="med-skeleton"></div>
      <div class="med-skeleton"></div>
    </div>
  </div>

  <a class="med-float-back" id="medBackBtn" href="https://indiakhelofootball.com/noticeboard">← Notice Board</a>

</div>

<script>
  const CITIES_URL = "/api/upcoming-trials/cities/";

  const grid      = document.getElementById("medGrid");
  const countPill = document.getElementById("countPill");

  /* ── helpers ── */
  function hasText(v) {
    return v !== null && v !== undefined && String(v).trim() !== "";
  }

  function esc(s) {
    if (s === null || s === undefined) return "";
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  /*
    Extract playlist ID from YouTube URL.
    e.g. https://www.youtube.com/playlist?list=PLoZTc5GKuPD3hm0AYhllC__MAVCwuJXb2
         → PLoZTc5GKuPD3hm0AYhllC__MAVCwuJXb2
  */
  function getPlaylistId(url) {
    try {
      return new URL(url).searchParams.get("list") || null;
    } catch(e) {
      return null;
    }
  }

  /*
    YouTube doesn't expose a public playlist thumbnail endpoint.
    The cleanest workaround: use the playlist ID as a "video ID" in the
    standard thumbnail CDN — this returns the channel/playlist cover for
    most public playlists. If it 404s the onerror hides it gracefully.
  */
  function getThumbUrl(videoLink) {
    const pid = getPlaylistId(videoLink);
    return pid
      ? `https://img.youtube.com/vi/${pid}/mqdefault.jpg`
      : "";
  }

  /* ── build one card ── */
  function buildCard(city) {
    const thumbUrl = esc(city.videoThumbnail || "");
    const href       = esc(city.videoLink);
    const cityName   = esc((city.cityName   || "—").trim());
    const stateName  = esc( city.stateName  || "");
    const projName   = esc( city.projectName|| "");

    const imgHTML = thumbUrl
      ? `<img class="med-thumb-img"
              src="${thumbUrl}"
              alt="${cityName} trial playlist"
              onerror="this.style.display='none'">`
      : "";

    return `
      <a class="med-card"
         href="${href}"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Watch ${cityName} trial playlist on YouTube">

        <div class="med-thumb-wrap">
          ${imgHTML}
          <div class="med-thumb-overlay"></div>
          <div class="med-play-btn">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <span class="med-playlist-badge">Playlist</span>
        </div>

        <div class="med-card-body">
          <div class="med-card-city">${cityName}</div>
          ${stateName ? `<div class="med-card-state">${stateName}</div>` : ""}
          ${projName  ? `<div class="med-card-project">${projName}</div>` : ""}
          <div class="med-card-cta">Watch Full Playlist</div>
        </div>

      </a>`;
  }

  /* ── fetch & render ── */
  async function loadMedia() {
    try {
      const res  = await fetch(CITIES_URL, { method: "GET", credentials: "same-origin" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      const list = Array.isArray(data)
        ? data
        : (Array.isArray(data.results) ? data.results : []);

      /* only cities with a videoLink present */
      const withVideo = list.filter(city => hasText(city.videoLink));

      const n = withVideo.length;
      countPill.textContent = `${n} Playlist${n === 1 ? "" : "s"}`;

      if (!n) {
        grid.innerHTML = `<div class="med-empty">No videos available yet — check back soon.</div>`;
        return;
      }

      grid.innerHTML = withVideo.map(buildCard).join("");

    } catch(e) {
      console.error(e);
      countPill.textContent = "Error";
      grid.innerHTML = `<div class="med-empty" style="color:#b91c1c;">
        Failed to load media. Please refresh the page.
      </div>`;
    }
  }

  loadMedia();

  /* ── float-back scroll reveal ── */
  (function(){
    const btn = document.getElementById('medBackBtn');
    if (!btn) return;
    const onScroll = () => btn.classList.toggle('show', window.scrollY > 140);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
  })();
</script>
{% endblock %}
