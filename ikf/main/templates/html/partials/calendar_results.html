
    {% for item in Calender %}
    <!-- TESTETSTEST -->
    <div class="workshop-card {% if item.status_date == 'COMPLETED' %}completed{% endif %}">
      <div class="workshop-header">
        <h4 class="{% if 'Naari Shakti' in item.project %}naari-shakti-title{% endif %}" {% if 'Naari Shakti' in item.project %}style="color:#e91e63;"{% endif %}>{{ item.project|default:"Tyger IKF S6" }}</h4>
        <button class="{{ item.status_date|default:'DATE CONFIRMED'|slugify|upper }}">
          {{ item.status_date|default:"DATE CONFIRMED"|upper }}
        </button>
      </div>

      <div class="workshop-fields">
        <input
          type="text"
          class="input-box"
          placeholder="{{ item.project_city }}"
          readonly
        />
        <input
          type="text"
          class="input-box"
          placeholder="{{ item.project_state }}"
          readonly
        />
        <div class="date-box">
          <p>
            {% if item.date %} 
            {{ item.date|date:"d M" }} 
            {% else %} 
            TBA 
            {% endif %}
          </p>
        </div>
        <a href="{{item.attr1}}" target="_blank" class="icon-btn">
          <img loading="lazy" src="static/images/calender/Vector.png" alt="Location Pin" />
        </a>
      </div>
      
  {% if item.status_date == 'COMPLETED' %}
  <div class="register-btn {% if item.status_date == 'COMPLETED' %}disabled{% endif %}">
    <span>Registration Closed</span>
  </div>
  {% else %}
    <a id="anchorforregister" target="_blank" rel="noopener noreferrer" href="https://app.myfirstkick.com/sign-in"><div class="register-btn {% if item.status_date == 'COMPLETED' %}disabled{% endif %}">
     Register Now
    </div></a>
  {% endif %}

    </div>
