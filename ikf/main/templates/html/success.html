{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
	body {
	  margin: 0;
	  padding: 0;
	  font-family: 'Inter', sans-serif;
	}
	
	.confirmation-wrapper {
	  min-height: 100vh;
	  background-color: #fffef2;
	  background-image:
		radial-gradient(circle at 15% 20%, rgba(255, 214, 70, 0.5) 0%, transparent 55%),
		radial-gradient(circle at 80% 25%, rgba(255, 214, 70, 0.55) 0%, transparent 58%),
		radial-gradient(circle at 30% 90%, rgba(255, 214, 70, 0.5) 0%, transparent 50%),
		radial-gradient(circle at 70% 75%, rgba(255, 214, 70, 0.5) 0%, transparent 52%),
		radial-gradient(circle at 50% 50%, rgba(255, 214, 70, 0.4) 0%, transparent 50%);
	  background-repeat: no-repeat;
	  background-size: 450px 450px, 500px 500px, 400px 400px, 450px 450px, 420px 420px;
	  background-position: top left, top right, bottom left, bottom right, center;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  padding: 60px 20px;
	  animation: fadeIn 1s ease-in-out; /* ✅ FADE-IN ADDED */
	}
	
	.confirmation-card {
	  background: white;
	  max-width: 880px;
	  width: 100%;
	  padding: 50px 40px;
	  border-radius: 16px;
	  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
	  text-align: center;
	}
	
	.confirmation-card h2 {
	  font-size: 28px;
	  font-weight: 600;
	  color: #222;
	  margin-bottom: 20px;
	}
	
	.confirmation-card p {
	  font-size: 16px;
	  line-height: 1.6;
	  color: #444;
	}
	
	@media (max-width: 768px) {
	  .confirmation-card {
		padding: 30px 20px;
	  }
	
	  .confirmation-card h2 {
		font-size: 22px;
	  }
	
	  .confirmation-card p {
		font-size: 15px;
	  }
	}
	
	/* ✅ FADE-IN ANIMATION */
	@keyframes fadeIn {
	  from {
		opacity: 0;
		transform: scale(0.98);
	  }
	  to {
		opacity: 1;
		transform: scale(1);
	  }
	}
	</style>

<div class="confirmation-wrapper">
  <div class="confirmation-card">
    <h2>Confirmation In Progress</h2>
    <p>
      You have made your payment. Please wait while we confirm your transaction.<br />
      <strong>Do not close or refresh this window.</strong>
    </p>
  </div>
</div>

<script>
  window.onload = function () {
    var inputdatastring = sessionStorage.getItem("ikfdonationdata");
    var data = JSON.parse(inputdatastring);
    $.ajax({
      type: "POST",
      url: "{% url 'save' %}",
      data: {
        razorpay_unique_id: sessionStorage.getItem("donation_IKF_unique_id"),
        data: sessionStorage.getItem("ikfdonationdata"),
        status: "success",
        razorpay_payment_id: localStorage.getItem("Donation_IKF_razorpay_payment_id"),
        razorpay_order_id: localStorage.getItem("Donation_IKF_razorpay_order_id"),
        razorpay_signature: localStorage.getItem("Donation_IKF_razorpay_signature"),
        error_code: "",
        error_description: "",
        error_source: "",
        error_reason: "",
        error_meta_order_id: "",
        error_meta_payment_id: "",
        amount: localStorage.getItem("IKF_Total_Amount"),
        csrfmiddlewaretoken: "{{ csrf_token }}",
      },
      success: function (result) {
        if (result) {
          let AMOUNTDATA = JSON.parse(result);
          sessionStorage.setItem("ikfuniqueid", AMOUNTDATA["ikfuniqueid"]);

          // Route donate-flow donors to the new donate thank-you page with params.
          // Falls back to legacy /thankyou for any non-donate caller.
          try {
            var d = JSON.parse(sessionStorage.getItem("ikfdonationdata") || "{}");
            var project = Array.isArray(d.purpose) ? (d.purpose[0] || "") : (d.purpose || "");
            if (project) {
              var params = new URLSearchParams({
                project:   project,
                method:    "razorpay",
                amount:    d.amount || "",
                email:     d.email || "",
                anonymous: d.anonymous ? "1" : "0",
                pid:       localStorage.getItem("Donation_IKF_razorpay_payment_id") || ""
              });
              window.location.href = "{% url 'donate_thank_you' %}?" + params.toString();
              return;
            }
          } catch (e) { /* fall through */ }
          window.location.href = "{% url 'thankyou' %}";
        }
      },
      error: function () {
        alert("Integrity Error. Please contact support.");
      }
    });
  };
</script>
{% endblock %}
