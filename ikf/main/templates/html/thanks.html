{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
}

.thanks-wrapper {
  min-height: 100vh;
  background-color: #fffef2;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255, 214, 70, 0.5) 0%, transparent 55%),
    radial-gradient(circle at 80% 25%, rgba(255, 214, 70, 0.55) 0%, transparent 58%),
    radial-gradient(circle at 30% 90%, rgba(255, 214, 70, 0.5) 0%, transparent 50%),
    radial-gradient(circle at 70% 75%, rgba(255, 214, 70, 0.5) 0%, transparent 52%),
    radial-gradient(circle at 50% 50%, rgba(255, 214, 70, 0.4) 0%, transparent 50%),
    
    radial-gradient(circle at 40% 60%, rgba(255, 214, 70, 0.4) 0%, transparent 50%);
  background-repeat: no-repeat;
  background-size: 450px 450px, 500px 500px, 400px 400px, 450px 450px, 420px 420px;
  background-position: top left, top right, bottom left, bottom right, center;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
}

.thanks-card {
  background: white;
  max-width: 880px;
  width: 100%;
  padding: 50px 40px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  text-align: center;
}

.thanks-card h2 {
  font-size: 28px;
  font-weight: 600;
  color: #222;
  margin-bottom: 20px;
}

.thanks-card p {
  font-size: 16px;
  line-height: 1.6;
  color: #444;
}

@media (max-width: 768px) {
  .thanks-card {
    padding: 30px 20px;
  }

  .thanks-card h2 {
    font-size: 22px;
  }

  .thanks-card p {
    font-size: 15px;
  }
}
.thanks-wrapper {
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.98);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
</style>

<div class="thanks-wrapper">
  <div class="thanks-card">
    <h2>Thank you for your generous Donation.</h2>
    <p>
      If you need an <strong>80G certificate</strong>, please email a screenshot of your payment to<br />
      <strong>donate@indiakhelofootball.com</strong>
    </p>
  </div>
</div>
{% endblock %}
